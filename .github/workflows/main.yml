name: practicework

on:
 push:
   branches: [ main ]

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
     -  uses: actions/checkout@v6.0.3

     -  name: setup node js
        uses: actions/setup-node@v6.4.0    
        with:
          node-version: 22.x

     -  name: install dependencies
        run: npm install

     - name: build app
       run: npm run build
           
       

          
       
       
